<main id="app" class="container mt-5 mb-5">
    <section class="card p-4 shadow">
        <h1 class="text-center mb-4">İletişim Formu</h1>

        <form id="iletisimForm" action="php/iletisim.php" method="POST">

            <input type="text" id="ad" name="ad" class="form-control mb-3" placeholder="Adınız">
            <input type="text" id="soyad" name="soyad" class="form-control mb-3" placeholder="Soyadınız">
            <input type="text" id="email" name="email" class="form-control mb-3" placeholder="E-posta">
            <input type="text" id="telefon" name="telefon" class="form-control mb-3" placeholder="Telefon">

            <select id="konu" name="konu" class="form-select mb-3">
                <option value="">Konu seçiniz</option>
                <option>Öneri</option>
                <option>Şikayet</option>
                <option>Bilgi Alma</option>
            </select>

            <p>Cinsiyet:</p>
            <label><input type="radio" name="cinsiyet" value="Erkek"> Erkek</label>
            <label class="ms-3"><input type="radio" name="cinsiyet" value="Kadın"> Kadın</label>

            <p class="mt-3">İlgi Alanları:</p>
            <label><input type="checkbox" name="ilgi[]" value="Web"> Web</label>
            <label class="ms-3"><input type="checkbox" name="ilgi[]" value="Oyun"> Oyun</label>
            <label class="ms-3"><input type="checkbox" name="ilgi[]" value="Anime"> Anime</label>

            <textarea id="mesaj" name="mesaj" class="form-control mt-3 mb-3" placeholder="Mesajınız"></textarea>

            <label class="mb-3">
                <input type="checkbox" id="onay" name="onay" value="Kabul edildi">
                Bilgilerimin gönderilmesini kabul ediyorum
            </label>

            <br>

            <button type="button" class="btn btn-dark" onclick="jsKontrol()">JavaScript ile Kontrol Et</button>
            <button type="button" class="btn btn-primary" @click="vueKontrol">Vue.js ile Kontrol Et</button>
            <button type="submit" class="btn btn-success">Gönder</button>

        </form>
    </section>
</main>

<script src="https://unpkg.com/vue@3"></script>

<script>
function formVerileriniKontrolEt() {
    let ad = document.getElementById("ad").value.trim();
    let soyad = document.getElementById("soyad").value.trim();
    let email = document.getElementById("email").value.trim();
    let telefon = document.getElementById("telefon").value.trim();
    let konu = document.getElementById("konu").value;
    let mesaj = document.getElementById("mesaj").value.trim();
    let onay = document.getElementById("onay").checked;

    let cinsiyetSecildi = document.querySelector('input[name="cinsiyet"]:checked');
    let ilgiSecildi = document.querySelectorAll('input[name="ilgi[]"]:checked');

    let emailKontrol = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    let telefonKontrol = /^[0-9]+$/;

    if (ad === "" || soyad === "" || email === "" || telefon === "" || konu === "" || mesaj === "") {
        return "Boş alan bırakmayınız.";
    }

    if (!emailKontrol.test(email)) {
        return "Geçerli bir e-posta adresi giriniz.";
    }

    if (!telefonKontrol.test(telefon)) {
        return "Telefon sadece rakamlardan oluşmalıdır.";
    }

    if (!cinsiyetSecildi) {
        return "Cinsiyet seçiniz.";
    }

    if (ilgiSecildi.length === 0) {
        return "En az bir ilgi alanı seçiniz.";
    }

    if (!onay) {
        return "Onay kutusunu işaretleyiniz.";
    }

    return "basarili";
}

function jsKontrol() {
    let sonuc = formVerileriniKontrolEt();

    if (sonuc === "basarili") {
        alert("JavaScript doğrulama başarılı.");
    } else {
        alert(sonuc);
    }
}

Vue.createApp({
    methods: {
        vueKontrol() {
            let sonuc = formVerileriniKontrolEt();

            if (sonuc === "basarili") {
                alert("Vue.js doğrulama başarılı.");
            } else {
                alert("Vue.js: " + sonuc);
            }
        }
    }
}).mount("#app");
</script>
