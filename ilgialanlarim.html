<header class="container text-center mt-5">
    <h1>İlgi Alanlarım</h1>
    <p>Anime dünyasından sevdiğim popüler yapımlar</p>
</header>

<main class="container mt-5">

    <section class="card p-4 shadow mb-4">
        <h2>Anime API Kullanımı</h2>
        <p>
            Bu sayfada ücretsiz bir API servisi kullanılarak anime verileri çekilmektedir.
        </p>

        <button class="btn btn-dark mt-2" onclick="animeleriGetir()">Animeleri Getir</button>
    </section>

    <section>
        <div id="animeListesi" class="row"></div>
    </section>

</main>

<script>
function animeleriGetir() {
    fetch("https://api.jikan.moe/v4/top/anime?limit=6")
        .then(response => response.json())
        .then(veri => {
            const liste = document.getElementById("animeListesi");
            liste.innerHTML = "";

            veri.data.forEach(anime => {
                liste.innerHTML += `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 shadow">
                            <img src="${anime.images.jpg.image_url}" class="card-img-top anime-img">
                            <div class="card-body">
                                <h5 class="card-title">${anime.title}</h5>
                                <p><strong>Puan:</strong> ${anime.score}</p>
                                <p><strong>Bölüm:</strong> ${anime.episodes}</p>
                                <a href="${anime.url}" target="_blank" class="btn btn-outline-dark">Detay</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        })
        .catch(error => {
            document.getElementById("animeListesi").innerHTML =
                "<p class='text-danger'>Veriler alınırken hata oluştu.</p>";
        });
}
</script>
